<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image + Audio Stream with Audio Monitor</title>
  <style>
    body {
      margin: 0;
      background-color: white;
      transition: background-color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    img {
      max-width: 80vw;
      max-height: 60vh;
      border: 2px solid #333;
      margin-bottom: 20px;
    }
    audio {
      width: 80vw;
      outline: none;
    }
  </style>
</head>
<body>
  <img src="http://localhost:8080/video_feed" alt="Video Stream" />
  <audio id="audio" src="http://localhost:8081/audio.mp3" autoplay controls></audio>

  <script>
    const audioElem = document.getElementById('audio');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaElementSource(audioElem);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function checkVolume() {
      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        sum += dataArray[i];
      }
      const avg = sum / dataArray.length;

      if (avg > 30) { // sound threshold - adjust if needed
        document.body.style.backgroundColor = 'red';
      } else {
        document.body.style.backgroundColor = 'white';
      }
      requestAnimationFrame(checkVolume);
    }

    audioElem.onplay = () => {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      checkVolume();
    };
  </script>
</body>
</html>
