<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Baby Monitor - Dual View</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #eee; }

    header {
      padding: 12px 16px;
      background: #1b1b1b;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    header button {
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #222;
      color: #eee;
      cursor: pointer;
    }

    header button:hover { background: #2a2a2a; }

    main {
      height: calc(100vh - 60px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
    }

    .bar {
      padding: 8px 10px;
      background: #151515;
      border-bottom: 1px solid #2a2a2a;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: 0;
      background: #000;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <strong>Dual Baby Monitor View</strong>
  <div>
    <button id="reloadAll">Reload Both</button>
    <button id="swap">Swap</button>
  </div>
</header>

<main>
  <section class="panel">
    <div class="bar" id="title1">http://192.168.1.12:8080/</div>
    <iframe id="frame1"
      src="http://192.168.1.12:8080/"  <!-- CHANGE THIS FOR A DIFFERENT DEVICE -->
      allow="autoplay; microphone; camera">
    </iframe>
  </section>

  <section class="panel">
    <div class="bar" id="title2">http://192.168.1.12:8090/</div>
    <iframe id="frame2"
      src="http://192.168.1.12:8090/" <!-- CHANGE THIS FOR A DIFFERENT DEVICE -->
      allow="autoplay; microphone; camera">
    </iframe>
  </section>
</main>

<script>
  const frame1 = document.getElementById("frame1");
  const frame2 = document.getElementById("frame2");
  const title1 = document.getElementById("title1");
  const title2 = document.getElementById("title2");

  document.getElementById("reloadAll").addEventListener("click", () => {
    frame1.src = frame1.src;
    frame2.src = frame2.src;
  });

  document.getElementById("swap").addEventListener("click", () => {
    const tmpSrc = frame1.src;
    frame1.src = frame2.src;
    frame2.src = tmpSrc;

    const tmpTitle = title1.textContent;
    title1.textContent = title2.textContent;
    title2.textContent = tmpTitle;
  });
</script>

</body>
</html>
